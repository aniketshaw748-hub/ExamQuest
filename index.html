<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0e17" />
    <script>
      // Apply the saved (or OS-preferred) theme before paint so there's no flash of the wrong one.
      (function () {
        try {
          var t = localStorage.getItem("quest.theme");
          if (t !== "light" && t !== "dark") {
            t = (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches) ? "light" : "dark";
          }
          document.documentElement.setAttribute("data-theme", t);
          if (t === "light") {
            var m = document.querySelector('meta[name="theme-color"]');
            if (m) m.setAttribute("content", "#e9ecf3");
          }
        } catch (e) {}
      })();
    </script>
    <title>Exam Quest — learn Sem-4 visually, beat the PYQs</title>
    <meta name="description" content="A study game for MAKAUT/WBUT Semester 4. Learn every idea through an interactive you can play with, then drill the most repeated previous-year questions across six subjects." />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Exam Quest" />
    <meta property="og:description" content="Learn Sem-4 ideas visually, then beat the previous-year questions. Six subjects, every lesson illustrated." />
    <meta name="twitter:card" content="summary" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
